<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <linearGradient id="fBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#03110a"/>
      <stop offset="60%" stop-color="#061a0e"/>
      <stop offset="100%" stop-color="#04120c"/>
    </linearGradient>
    <radialGradient id="fGlow" cx="50%" cy="30%">
      <stop offset="0%" stop-color="#00AECB" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00AECB" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="380" fill="url(#fBg)"/>
  <rect width="600" height="380" fill="url(#fGlow)"/>
  
  <!-- Forest canopy layer -->
  <g fill="#0d2c15" opacity="0.9">
    <!-- Background trees -->
    <circle cx="50" cy="200" r="70"/>
    <circle cx="130" cy="180" r="80"/>
    <circle cx="240" cy="170" r="90"/>
    <circle cx="360" cy="175" r="85"/>
    <circle cx="480" cy="180" r="80"/>
    <circle cx="570" cy="200" r="65"/>
    <!-- Midground -->
    <circle cx="80" cy="240" r="60"/>
    <circle cx="200" cy="225" r="75"/>
    <circle cx="310" cy="220" r="70"/>
    <circle cx="420" cy="228" r="72"/>
    <circle cx="540" cy="235" r="58"/>
  </g>
  
  <!-- Ground -->
  <rect x="0" y="300" width="600" height="80" fill="#071a0b" opacity="1"/>
  
  <!-- Tree trunks -->
  <g fill="#052109" opacity="0.8">
    <rect x="46" y="270" width="8" height="50"/>
    <rect x="126" y="270" width="8" height="50"/>
    <rect x="236" y="270" width="8" height="50"/>
    <rect x="356" y="270" width="8" height="50"/>
    <rect x="476" y="270" width="8" height="50"/>
  </g>
  
  <!-- Underground water table suggestion -->
  <rect x="0" y="330" width="600" height="2" fill="#00AECB" opacity="0.15"/>
  <text x="300" y="355" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#00AECB" opacity="0.3" letter-spacing="3">GROUNDWATER TABLE</text>
  
  <!-- Data overlay -->
  <rect x="200" y="25" width="200" height="80" rx="5" fill="rgba(0,174,203,0.06)" stroke="rgba(0,174,203,0.15)" stroke-width="1"/>
  <text x="300" y="50" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8892A4" letter-spacing="1">REDUCTION POTENTIAL</text>
  <text x="300" y="74" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#00AECB">45–50%</text>
  <text x="300" y="92" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8892A4">groundwater conservation · UAE forests</text>
</svg>