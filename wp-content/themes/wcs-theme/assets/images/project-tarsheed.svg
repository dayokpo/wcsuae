<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="tBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111e"/>
      <stop offset="100%" stop-color="#0c1f30"/>
    </linearGradient>
    <radialGradient id="tGlow" cx="30%" cy="50%">
      <stop offset="0%" stop-color="#00AECB" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00AECB" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#tBg)"/>
  <rect width="800" height="500" fill="url(#tGlow)"/>
  
  <!-- Ground -->
  <rect x="0" y="360" width="800" height="140" fill="#0a1a10" opacity="0.8"/>
  
  <!-- Large landscape area suggestion -->
  <rect x="0" y="340" width="800" height="40" fill="#0d2215" opacity="0.6"/>
  
  <!-- Tree silhouettes (park setting) -->
  <g fill="#0e2916" opacity="0.7">
    <circle cx="120" cy="300" r="65"/>
    <rect x="110" y="300" width="20" height="80"/>
    <circle cx="220" cy="270" r="80"/>
    <rect x="210" y="320" width="20" height="80"/>
    <circle cx="600" cy="290" r="70"/>
    <rect x="590" y="310" width="20" height="80"/>
    <circle cx="700" cy="275" r="60"/>
    <rect x="690" y="295" width="18" height="90"/>
    <circle cx="500" cy="310" r="55"/>
    <rect x="492" y="330" width="16" height="70"/>
  </g>
  
  <!-- Irrigation lines across the ground -->
  <g stroke="#00AECB" stroke-width="1.5" opacity="0.25" fill="none">
    <path d="M0 385 Q200 375 400 380 Q600 385 800 375"/>
    <path d="M0 400 Q200 390 400 395 Q600 400 800 390"/>
    <path d="M0 415 Q200 405 400 410 Q600 415 800 405"/>
  </g>
  
  <!-- Drip emitters -->
  <g fill="#00AECB" opacity="0.4">
    <circle cx="100" cy="385" r="3"/>
    <circle cx="200" cy="385" r="3"/>
    <circle cx="300" cy="385" r="3"/>
    <circle cx="400" cy="385" r="3"/>
    <circle cx="500" cy="385" r="3"/>
    <circle cx="600" cy="385" r="3"/>
    <circle cx="700" cy="385" r="3"/>
  </g>
  
  <!-- Sky / atmosphere -->
  <rect x="0" y="0" width="800" height="240" fill="#061018" opacity="0.5"/>
  
  <!-- Data overlay boxes -->
  <rect x="40" y="40" width="180" height="80" rx="6" fill="rgba(0,174,203,0.06)" stroke="rgba(0,174,203,0.2)" stroke-width="1"/>
  <text x="55" y="68" font-family="sans-serif" font-size="10" fill="#8892A4" letter-spacing="1">PROGRAMME</text>
  <text x="55" y="88" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00AECB">Tarsheed</text>
  <text x="55" y="106" font-family="sans-serif" font-size="10" fill="#8892A4">Abu Dhabi · 2018–2022</text>
  
  <rect x="580" y="40" width="180" height="80" rx="6" fill="rgba(0,174,203,0.06)" stroke="rgba(0,174,203,0.2)" stroke-width="1"/>
  <text x="595" y="68" font-family="sans-serif" font-size="10" fill="#8892A4" letter-spacing="1">SAVINGS</text>
  <text x="595" y="88" font-family="sans-serif" font-size="18" font-weight="bold" fill="#00AECB">3M+ m³</text>
  <text x="595" y="106" font-family="sans-serif" font-size="10" fill="#8892A4">over 4 years</text>
</svg>