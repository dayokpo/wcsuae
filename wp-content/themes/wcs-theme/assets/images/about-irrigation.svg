<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" width="600" height="750">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0c1f35"/>
      <stop offset="100%" stop-color="#060d14"/>
    </linearGradient>
    <linearGradient id="water1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00AECB" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1B4F8C" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="glow1" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#00AECB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00AECB" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="750" fill="url(#bg1)"/>
  
  <!-- Glow -->
  <ellipse cx="300" cy="300" rx="280" ry="200" fill="url(#glow1)"/>
  
  <!-- Grid lines suggesting precision -->
  <g opacity="0.06" stroke="#00AECB" stroke-width="1">
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
    <line x1="0" y1="600" x2="600" y2="600"/>
    <line x1="100" y1="0" x2="100" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="750"/>
    <line x1="300" y1="0" x2="300" y2="750"/>
    <line x1="400" y1="0" x2="400" y2="750"/>
    <line x1="500" y1="0" x2="500" y2="750"/>
  </g>
  
  <!-- Irrigation pipe system schematic -->
  <g opacity="0.3" stroke="url(#water1)" stroke-width="2" fill="none">
    <!-- Main pipe -->
    <line x1="100" y1="375" x2="500" y2="375"/>
    <!-- Branch pipes -->
    <line x1="150" y1="375" x2="150" y2="250"/>
    <line x1="250" y1="375" x2="250" y2="200"/>
    <line x1="350" y1="375" x2="350" y2="220"/>
    <line x1="450" y1="375" x2="450" y2="260"/>
    <!-- Emitters -->
    <circle cx="150" cy="240" r="6" fill="#00AECB" opacity="0.5"/>
    <circle cx="250" cy="190" r="6" fill="#00AECB" opacity="0.5"/>
    <circle cx="350" cy="210" r="6" fill="#00AECB" opacity="0.5"/>
    <circle cx="450" cy="250" r="6" fill="#00AECB" opacity="0.5"/>
    <!-- Water drop indicators -->
    <path d="M150 255 L145 270 Q150 278 155 270 Z" fill="#00AECB" opacity="0.6"/>
    <path d="M250 205 L245 220 Q250 228 255 220 Z" fill="#00AECB" opacity="0.6"/>
    <path d="M350 225 L345 240 Q350 248 355 240 Z" fill="#00AECB" opacity="0.6"/>
    <path d="M450 265 L445 280 Q450 288 455 280 Z" fill="#00AECB" opacity="0.6"/>
  </g>
  
  <!-- Large water drop centered -->
  <path d="M300 150 C300 150 240 260 240 320 C240 353 267 380 300 380 C333 380 360 353 360 320 C360 260 300 150 300 150Z" 
        fill="none" stroke="#00AECB" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Inner water wave -->
  <path d="M260 335 Q275 315 290 330 Q305 345 320 325 Q335 308 350 330" 
        fill="none" stroke="#00AECB" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
  
  <!-- Data circles / sensor nodes -->
  <circle cx="200" cy="450" r="20" fill="none" stroke="#00AECB" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="450" r="4" fill="#00AECB" opacity="0.4"/>
  <circle cx="400" cy="480" r="16" fill="none" stroke="#1B4F8C" stroke-width="1" opacity="0.35"/>
  <circle cx="400" cy="480" r="3" fill="#1B4F8C" opacity="0.5"/>
  
  <!-- Palm silhouettes -->
  <g opacity="0.12" fill="#1a5c3a">
    <ellipse cx="80" cy="620" rx="60" ry="20"/>
    <rect x="76" y="480" width="8" height="140"/>
    <ellipse cx="80" cy="480" rx="55" ry="15"/>
    <ellipse cx="80" cy="480" rx="40" ry="12" transform="rotate(-20 80 480)"/>
    <ellipse cx="80" cy="480" rx="40" ry="12" transform="rotate(20 80 480)"/>
    
    <ellipse cx="530" cy="600" rx="55" ry="18"/>
    <rect x="526" y="470" width="8" height="130"/>
    <ellipse cx="530" cy="470" rx="50" ry="14"/>
    <ellipse cx="530" cy="470" rx="38" ry="11" transform="rotate(-25 530 470)"/>
    <ellipse cx="530" cy="470" rx="38" ry="11" transform="rotate(25 530 470)"/>
  </g>
  
  <!-- Data label: WCS Irrigation Monitoring -->
  <text x="300" y="560" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#00AECB" opacity="0.35" letter-spacing="3">PRECISION IRRIGATION MONITORING</text>
  <text x="300" y="578" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8892A4" opacity="0.5" letter-spacing="2">UAE · DEMAND-SIDE MANAGEMENT</text>
</svg>