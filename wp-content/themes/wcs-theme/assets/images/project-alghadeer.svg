<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <linearGradient id="aBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05101a"/>
      <stop offset="100%" stop-color="#091820"/>
    </linearGradient>
    <linearGradient id="aBlu" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B4F8C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00AECB" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="380" fill="url(#aBg)"/>
  
  <!-- Building silhouettes (community) -->
  <g fill="#0c1e30" opacity="0.8">
    <rect x="30" y="180" width="70" height="160"/>
    <rect x="50" y="150" width="30" height="30"/>
    <rect x="120" y="200" width="80" height="140"/>
    <rect x="130" y="160" width="60" height="40"/>
    <rect x="430" y="170" width="90" height="170"/>
    <rect x="445" y="130" width="60" height="40"/>
    <rect x="530" y="190" width="70" height="150"/>
    <rect x="300" y="210" width="110" height="130"/>
    <rect x="315" y="170" width="80" height="40"/>
  </g>
  
  <!-- Landscape strip -->
  <rect x="0" y="310" width="600" height="70" fill="#0c2016" opacity="0.9"/>
  
  <!-- Smart controller box suggestion -->
  <rect x="260" y="240" width="80" height="55" rx="4" fill="#0c1e2e" stroke="#00AECB" stroke-width="1" opacity="0.7"/>
  <text x="300" y="263" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#00AECB" opacity="0.8">SMART</text>
  <text x="300" y="275" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#00AECB" opacity="0.8">CTRL</text>
  <circle cx="274" cy="281" r="3" fill="#00AECB" opacity="0.6"/>
  <circle cx="284" cy="281" r="3" fill="#1B4F8C" opacity="0.5"/>
  
  <!-- Data stats overlay -->
  <rect x="20" y="20" width="150" height="65" rx="5" fill="rgba(0,174,203,0.07)" stroke="rgba(0,174,203,0.2)" stroke-width="1"/>
  <text x="35" y="44" font-family="sans-serif" font-size="9" fill="#8892A4" letter-spacing="1">BASELINE</text>
  <text x="35" y="62" font-family="sans-serif" font-size="14" font-weight="bold" fill="#E8EAF0">1,800 m³/d</text>
  <text x="35" y="76" font-family="sans-serif" font-size="8" fill="#8892A4">→ reduced to 1,100 m³/d</text>
  
  <rect x="430" y="20" width="150" height="65" rx="5" fill="rgba(0,174,203,0.07)" stroke="rgba(0,174,203,0.2)" stroke-width="1"/>
  <text x="445" y="44" font-family="sans-serif" font-size="9" fill="#8892A4" letter-spacing="1">PEAK SAVING</text>
  <text x="445" y="62" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00AECB">~50%</text>
  <text x="445" y="76" font-family="sans-serif" font-size="8" fill="#8892A4">best months achieved</text>
</svg>